<div id="experience" class="section-wrapper">
  <div class="section-inner">
    <div class="section-tag">// Where I've worked</div>
    <h2 class="section-title">Work <span>Experience</span></h2>
    <div class="section-line"></div>

    <div class="timeline">
      <div
        class="timeline-item"
        *ngFor="let exp of experiences; let i = index"
        appReveal
        [revealDelay]="i * 100">

        <div class="timeline-dot">
          <div class="dot-inner"></div>
        </div>

        <div class="timeline-card">
          <div class="card-header">
            <div class="card-header-left">
              <h3 class="role">{{ exp.role }}</h3>
              <div class="company">
                <i class="fas fa-building"></i>
                {{ exp.company }}
                <span class="sep">·</span>
                <i class="fas fa-map-marker-alt"></i>
                {{ exp.location }}
              </div>
              <div class="stack-label">{{ exp.stack }}</div>
            </div>
            <span class="period">{{ exp.period }}</span>
          </div>

          <ul class="points">
            <li *ngFor="let point of exp.points">{{ point }}</li>
          </ul>

          <!-- Org Photo Strip -->
          <div class="photo-strip" *ngIf="exp.photos.length">
            <div class="photo-slot" *ngFor="let photo of exp.photos">
              <img *ngIf="photo.src" [src]="photo.src" [alt]="photo.label" />
              <div *ngIf="!photo.src" class="photo-placeholder">
                <i class="fas fa-camera"></i>
                <span>{{ photo.label }}</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
